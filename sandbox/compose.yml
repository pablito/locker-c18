# Orchestrazione per scenari multi-agente
# Uso: docker compose -f sandbox/compose.yml up
services:
  agent-primary:
    build: .
    image: agent-sandbox:latest
    volumes:
      - ../:/workspace
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY
      - GITHUB_TOKEN
      - OPENAI_API_KEY
    networks:
      - agent-net
    stdin_open: true
    tty: true

  agent-secondary:
    image: agent-sandbox:latest
    volumes:
      - ../:/workspace
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY
      - GITHUB_TOKEN
      - OPENAI_API_KEY
    networks:
      - agent-net
    stdin_open: true
    tty: true
    profiles:
      - multi  # attivato solo con: docker compose --profile multi up

networks:
  agent-net:
    driver: bridge
    internal: true  # rete isolata, senza accesso internet diretto tra agenti
